<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — SkillSwap</title>
<link rel="stylesheet" href="/styles/main.css">
<link rel="stylesheet" href="/styles/modal.css">
<link rel="stylesheet" href="/styles/animations.css">
<style>
  .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 16px; margin: 60px 0; min-height: 250px; }
  .podium-spot { display: flex; flex-direction: column; align-items: center; width: 140px; }
  .podium-rank { font-family: var(--font-display); font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: -15px; z-index: 1; }
  .podium-1 .podium-rank { color: var(--accent-saffron); font-size: 64px; }
  .podium-2 .podium-rank { color: #C0C0C0; }
  .podium-3 .podium-rank { color: #CD7F32; }
  .podium-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--bg-deep); background: var(--ink-primary); z-index: 2; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: #fff; font-size: 24px; overflow: hidden; }
  .podium-1 .podium-avatar { width: 100px; height: 100px; border-color: var(--accent-saffron); box-shadow: 0 0 30px rgba(232,160,32,0.3); }
  .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .podium-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-top: 16px; text-align: center; }
  .podium-xp { font-family: var(--font-mono); font-size: 12px; color: var(--accent-saffron); margin-top: 4px; }
  
  .leaderboard-list { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .lb-row { display: flex; align-items: center; gap: 16px; padding: 16px 24px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; transition: transform 0.2s; }
  .lb-row:hover { transform: translateX(5px); box-shadow: var(--shadow-sm); }
  .lb-rank { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--ink-faint); width: 30px; text-align: center; }
  .lb-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-teal), var(--accent-saffron)); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
  .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .lb-info { flex: 1; }
  .lb-name { font-family: var(--font-display); font-weight: 700; font-size: 16px; }
  .lb-uni { font-size: 12px; color: var(--ink-faint); font-style: italic; margin-top: 2px; }
  .lb-stats { text-align: right; }
  .lb-xp { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--accent-saffron); }
  .lb-badges { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bokeh-wrap">
    <div class="bokeh"></div><div class="bokeh"></div>
  </div>
</div>

<nav id="navbar">
  <a href="/" class="nav-logo">Skill<span>Swap</span></a>
  <ul class="nav-links">
    <li><a href="/explore.html">Explore</a></li>
    <li><a href="/leaderboard.html" class="active">Leaderboard</a></li>
  </ul>
</nav>

<div style="padding:100px 24px; min-height: calc(100vh - 80px);">
  <div style="text-align:center;margin-bottom:40px;">
    <h1 style="font-family:var(--font-display);font-size:48px;font-weight:900;margin-bottom:16px;">Top <em style="color:var(--accent-saffron);">Teachers</em></h1>
    <p style="font-size:16px;font-style:italic;color:var(--ink-muted);">Earn XP by teaching sessions, getting good reviews, and completing challenges.</p>
    
    <div class="auth-tabs" style="max-width:300px;margin:32px auto 0;">
      <button class="auth-tab active" data-period="alltime" onclick="switchTab('alltime')">All Time</button>
      <button class="auth-tab" data-period="weekly" onclick="switchTab('weekly')">This Week</button>
    </div>
  </div>

  <div id="leaderboardContent">
    <div style="text-align:center;padding:40px;"><div class="skeleton" style="width:300px;height:300px;border-radius:50%;margin:0 auto;"></div></div>
  </div>
</div>

<footer>
  <div class="footer-logo">Skill<span style="color:rgba(255,255,255,.3);font-weight:400;">Swap</span></div>
  <div class="footer-links">
    <a href="/explore.html">Explore</a>
    <a href="/dashboard.html">Dashboard</a>
  </div>
  <div class="footer-text">© 2026 SkillSwap.</div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/main.js"></script>
<script src="/js/leaderboard.js"></script>

</body>
</html>
